<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blixa AI - Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        pre { background: #18181b; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.5rem 0; }
        code { font-family: monospace; color: #fbbf24; }
    </style>
</head>
<body class="bg-[#0e0e10] text-gray-100 h-screen flex overflow-hidden">

    <aside id="sidebar" class="w-64 bg-[#171719] border-r border-zinc-800 flex-col hidden md:flex">
        <div class="p-4 border-b border-zinc-800 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight text-white">Blixa</h1>
            <button onclick="newChat()" class="p-2 hover:bg-zinc-800 rounded-lg transition">
                <i data-lucide="plus-circle" class="w-5 h-5 text-zinc-400"></i>
            </button>
        </div>
        <div id="chatHistory" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1">
            </div>
        <div class="p-4 border-t border-zinc-800">
            <button onclick="toggleModal('settingsModal')" class="w-full flex items-center gap-3 p-2 hover:bg-zinc-800 rounded-lg transition text-sm">
                <i data-lucide="settings" class="w-4 h-4"></i> Settings
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative h-full">
        <header class="h-14 border-b border-zinc-800 flex items-center justify-between px-4 bg-[#0e0e10]/80 backdrop-blur-md z-10">
            <button onclick="toggleSidebar()" class="md:hidden p-2 hover:bg-zinc-800 rounded-lg">
                <i data-lucide="menu" class="w-5 h-5"></i>
            </button>
            <div class="text-sm font-medium text-zinc-400" id="currentModelDisplay">Model: Loading...</div>
            <div class="w-8"></div>
        </header>

        <div id="chatWindow" class="flex-1 overflow-y-auto custom-scrollbar p-4 md:p-8 space-y-6 pb-32">
            <div id="welcomeScreen" class="h-full flex flex-col items-center justify-center text-center space-y-4">
                <div class="w-16 h-16 bg-zinc-800 rounded-2xl flex items-center justify-center mb-4">
                    <i data-lucide="sparkles" class="w-8 h-8 text-blue-400"></i>
                </div>
                <h2 class="text-2xl font-semibold">How can Blixa help you today?</h2>
                <p class="text-zinc-500 max-w-md">Enter your OpenRouter API key in settings to start chatting with your favorite models.</p>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-[#0e0e10] via-[#0e0e10] to-transparent">
            <div class="max-w-3xl mx-auto relative">
                <textarea id="userInput" rows="1" 
                    class="w-full bg-[#1c1c1f] border border-zinc-700 rounded-2xl p-4 pr-12 focus:outline-none focus:ring-2 focus:ring-blue-500/50 resize-none custom-scrollbar"
                    placeholder="Message Blixa..."></textarea>
                <button onclick="sendMessage()" class="absolute right-3 bottom-3 p-2 bg-white text-black rounded-xl hover:bg-zinc-200 transition">
                    <i data-lucide="arrow-up" class="w-5 h-5"></i>
                </button>
            </div>
            <p class="text-[10px] text-center mt-2 text-zinc-600 uppercase tracking-widest">Powered by OpenRouter & Tailwind</p>
        </div>
    </main>

    <div id="settingsModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4">
        <div class="bg-[#1c1c1f] border border-zinc-800 w-full max-w-md rounded-2xl p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-bold">Settings</h3>
                <button onclick="toggleModal('settingsModal')"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-zinc-500 uppercase mb-1">OpenRouter API Key</label>
                    <input type="password" id="apiKeyInput" class="w-full bg-[#0e0e10] border border-zinc-800 rounded-lg p-2.5 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-zinc-500 uppercase mb-1">Model Name</label>
                    <input type="text" id="modelInput" placeholder="google/gemini-2.0-flash-001" class="w-full bg-[#0e0e10] border border-zinc-800 rounded-lg p-2.5 focus:border-blue-500 outline-none">
                </div>
                <button onclick="saveSettings()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg font-medium transition">Save Configuration</button>
            </div>
        </div>
    </div>

    <script>
        // --- Initialization & State ---
        const md = window.markdownit();
        let chats = JSON.parse(localStorage.getItem('blixa_chats') || '[]');
        let currentChatId = null;
        let config = JSON.parse(localStorage.getItem('blixa_config') || '{"apiKey": "", "model": "google/gemini-2.0-flash-001"}');

        function init() {
            lucide.createIcons();
            document.getElementById('apiKeyInput').value = config.apiKey;
            document.getElementById('modelInput').value = config.model;
            document.getElementById('currentModelDisplay').innerText = `Model: ${config.model.split('/').pop()}`;
            renderHistory();
            
            // Auto-resize textarea
            const tx = document.getElementById('userInput');
            tx.addEventListener("input", function() {
                this.style.height = "auto";
                this.style.height = (this.scrollHeight) + "px";
            });
        }

        // --- Core Logic ---
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text || !config.apiKey) {
                if(!config.apiKey) alert("Please set your API Key in Settings first!");
                return;
            }

            if (!currentChatId) {
                currentChatId = Date.now();
                chats.unshift({ id: currentChatId, title: text.substring(0, 30), messages: [] });
            }

            const currentChat = chats.find(c => c.id === currentChatId);
            currentChat.messages.push({ role: 'user', content: text });
            
            input.value = '';
            input.style.height = "auto";
            renderMessages();
            document.getElementById('welcomeScreen').classList.add('hidden');

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${config.apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": config.model,
                        "messages": currentChat.messages
                    })
                });

                const data = await response.json();
                const aiMessage = data.choices[0].message.content;
                currentChat.messages.push({ role: 'assistant', content: aiMessage });
                
                saveData();
                renderMessages();
                renderHistory();
            } catch (error) {
                console.error("Error:", error);
                alert("Failed to fetch response. Check console/API key.");
            }
        }

        function renderMessages() {
            const window = document.getElementById('chatWindow');
            const currentChat = chats.find(c => c.id === currentChatId);
            if (!currentChat) return;

            window.innerHTML = currentChat.messages.map(msg => `
                <div class="flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in duration-300">
                    <div class="max-w-[85%] p-4 rounded-2xl ${msg.role === 'user' ? 'bg-blue-600 text-white' : 'bg-zinc-800 text-zinc-100'}">
                        <div class="text-xs opacity-50 mb-1 uppercase font-bold tracking-tighter">${msg.role === 'assistant' ? 'Blixa' : 'You'}</div>
                        <div class="prose prose-invert prose-sm">${md.render(msg.content)}</div>
                    </div>
                </div>
            `).join('');
            window.scrollTo({ top: window.scrollHeight, behavior: 'smooth' });
            lucide.createIcons();
        }

        // --- UI Helpers ---
        function renderHistory() {
            const hist = document.getElementById('chatHistory');
            hist.innerHTML = chats.map(chat => `
                <button onclick="loadChat(${chat.id})" class="w-full text-left p-3 rounded-xl hover:bg-zinc-800 group flex items-center justify-between ${currentChatId === chat.id ? 'bg-zinc-800' : ''}">
                    <span class="truncate text-sm text-zinc-300">${chat.title}</span>
                    <i data-lucide="message-square" class="w-3 h-3 opacity-0 group-hover:opacity-100 transition"></i>
                </button>
            `).join('');
            lucide.createIcons();
        }

        function loadChat(id) {
            currentChatId = id;
            document.getElementById('welcomeScreen').classList.add('hidden');
            renderMessages();
            renderHistory();
        }

        function newChat() {
            currentChatId = null;
            document.getElementById('chatWindow').innerHTML = ''; // Reset window
            document.getElementById('welcomeScreen').classList.remove('hidden');
            renderHistory();
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.classList.toggle('hidden');
            m.classList.toggle('flex');
        }

        function saveSettings() {
            config.apiKey = document.getElementById('apiKeyInput').value;
            config.model = document.getElementById('modelInput').value || "google/gemini-2.0-flash-001";
            localStorage.setItem('blixa_config', JSON.stringify(config));
            document.getElementById('currentModelDisplay').innerText = `Model: ${config.model.split('/').pop()}`;
            toggleModal('settingsModal');
        }

        function saveData() {
            localStorage.setItem('blixa_chats', JSON.stringify(chats));
        }

        function toggleSidebar() {
            const s = document.getElementById('sidebar');
            s.classList.toggle('hidden');
            s.classList.toggle('fixed');
            s.classList.toggle('inset-y-0');
            s.classList.toggle('left-0');
            s.classList.toggle('z-50');
        }

        // Start
        init();
    </script>
</body>
</html>
