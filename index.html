<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blixa Quantum | Autonomous AI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { brand: { 500: '#ec4899' }, surface: { 50: '#f8fafc', 950: '#09090b' } },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
                } 
            }
        }
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .blixa-gradient-text { background: linear-gradient(to right, #0ea5e9, #a855f7, #f43f5e, #fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(0, 0, 0, 0.05); }
        .dark .glass-card { background: rgba(24, 24, 27, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); }
        .action-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #f1f5f9; border-radius: 28px; }
        .action-card:active { scale: 0.95; background: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-white dark:bg-surface-950 h-screen flex flex-col overflow-hidden">

    <header class="flex items-center justify-between px-6 py-4 border-b dark:border-zinc-800 bg-white/80 dark:bg-zinc-950/80 backdrop-blur-md z-50">
        <div class="flex items-center gap-3">
            <button onclick="toggleSidebar()" class="p-2"><i data-lucide="menu" class="w-6 h-6"></i></button>
            <div class="text-xl font-extrabold tracking-tighter">BLIXA <span class="text-brand-500">CORE</span></div>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="location.reload()" class="p-2 text-zinc-500"><i data-lucide="home" class="w-5 h-5"></i></button>
            <button onclick="location.reload()" class="p-2.5 bg-brand-500 text-white rounded-xl shadow-lg shadow-brand-500/30"><i data-lucide="plus" class="w-5 h-5"></i></button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto no-scrollbar relative">
        <div id="chat-container" class="max-w-2xl mx-auto px-6 pt-10 pb-44 space-y-6">
            
            <div id="welcome-view" class="text-center">
                <div class="w-24 h-24 bg-brand-500 rounded-[30px] flex items-center justify-center shadow-2xl mx-auto mb-10 rotate-6 shadow-brand-500/40">
                    <img src="blixa.png" class="w-14 h-14" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4712/4712139.png'">
                </div>
                
                <h1 class="text-5xl font-black mb-6 blixa-gradient-text tracking-tighter">Autonomous AI.</h1>
                <p class="text-zinc-500 dark:text-zinc-400 font-medium text-sm leading-relaxed mb-12">
                    System Version 2026.4. Stability confirmed. Integrated self-<br>healing logic active. Ready for professional command input.
                </p>

                <div class="space-y-4 text-left">
                    <div onclick="quickMsg('System Audit')" class="action-card p-6 cursor-pointer flex flex-col gap-1 bg-white dark:bg-zinc-900">
                        <i data-lucide="shield-check" class="w-6 h-6 text-brand-500 mb-2"></i>
                        <p class="font-bold text-sm">System Audit</p>
                        <p class="text-[10px] text-zinc-400 uppercase tracking-widest">Deep Logic Scan</p>
                    </div>
                    
                    <div onclick="quickMsg('Heal Program')" class="action-card p-6 cursor-pointer flex flex-col gap-1 bg-white dark:bg-zinc-900">
                        <i data-lucide="zap" class="w-6 h-6 text-orange-500 mb-2"></i>
                        <p class="font-bold text-sm">Heal Program</p>
                        <p class="text-[10px] text-zinc-400 uppercase tracking-widest">Automatic Fix</p>
                    </div>

                    <div onclick="quickMsg('Plan Architect')" class="action-card p-6 cursor-pointer flex flex-col gap-1 bg-white dark:bg-zinc-900">
                        <i data-lucide="layers" class="w-6 h-6 text-sky-500 mb-2"></i>
                        <p class="font-bold text-sm">Plan Architect</p>
                        <p class="text-[10px] text-zinc-400 uppercase tracking-widest">Business Logic</p>
                    </div>
                </div>
            </div>

            <div id="messages" class="space-y-6"></div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 p-4 pb-8 bg-gradient-to-t from-white dark:from-surface-950 via-white/80">
        <div class="max-w-2xl mx-auto">
            <div class="glass-card rounded-[35px] p-2 flex flex-col shadow-2xl border dark:border-white/10">
                <textarea id="user-input" rows="1" placeholder="Type command..." class="w-full bg-transparent px-6 py-4 outline-none resize-none text-zinc-800 dark:text-white text-base" oninput="autoResize(this)"></textarea>
                
                <div class="flex items-center justify-between px-4 pb-3">
                    <div class="flex gap-5 text-zinc-400">
                        <button class="hover:text-brand-500 transition-colors"><i data-lucide="mic" class="w-6 h-6"></i></button>
                        <button class="hover:text-brand-500 transition-colors"><i data-lucide="paperclip" class="w-6 h-6"></i></button>
                    </div>
                    <button id="send-btn" onclick="handleSend()" class="w-12 h-12 bg-brand-500/20 text-brand-500 rounded-2xl flex items-center justify-center transition-all disabled:opacity-30" disabled>
                        <i data-lucide="navigation" class="w-6 h-6 fill-current"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
            document.getElementById('send-btn').disabled = !textarea.value.trim();
            if(textarea.value.trim()) {
                document.getElementById('send-btn').classList.remove('bg-brand-500/20', 'text-brand-500');
                document.getElementById('send-btn').classList.add('bg-brand-500', 'text-white');
            } else {
                document.getElementById('send-btn').classList.add('bg-brand-500/20', 'text-brand-500');
                document.getElementById('send-btn').classList.remove('bg-brand-500', 'text-white');
            }
        }

        function handleSend() {
            const input = document.getElementById('user-input');
            const welcome = document.getElementById('welcome-view');
            const msgContainer = document.getElementById('messages');

            if (input.value.trim() === "") return;

            if (welcome) welcome.style.display = 'none';

            const userMsg = document.createElement('div');
            userMsg.className = "flex justify-end animate-in fade-in slide-in-from-bottom-2";
            userMsg.innerHTML = `<div class="bg-brand-500 text-white px-6 py-4 rounded-[24px] rounded-tr-none shadow-lg max-w-[85%] text-sm font-medium leading-relaxed">${input.value}</div>`;
            
            msgContainer.appendChild(userMsg);
            input.value = "";
            autoResize(input);
            window.scrollTo(0, document.body.scrollHeight);
        }

        function quickMsg(text) {
            document.getElementById('user-input').value = text;
            autoResize(document.getElementById('user-input'));
            handleSend();
        }
    </script>
</body>
</html>
