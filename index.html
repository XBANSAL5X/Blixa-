<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blixa Quantum | Autonomous AI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        brand: { 500: '#ec4899', 600: '#db2777' },
                        surface: { 50: '#f8fafc', 900: '#0f172a', 950: '#09090b' } 
                    },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                } 
            }
        }
    </script>

    <style>
        /* --- UI CORE STYLES --- */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #27272a; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.3s ease; }
        .blixa-gradient-text { background: linear-gradient(135deg, #ff0000, #ffea00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .full-gradient { background: linear-gradient(to right, #0ea5e9, #a855f7, #f43f5e, #fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }

        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(0, 0, 0, 0.05); }
        .dark .glass-card { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }

        #blixa-terminal { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
        .terminal-line { margin-bottom: 2px; color: #10b981; }
        .terminal-line.info { color: #3b82f6; }

        .voice-active-overlay { background: rgba(9, 9, 11, 0.98); backdrop-filter: blur(40px); }
        .pulse { position: absolute; border-radius: 50%; border: 2px solid #ec4899; animation: pulse-out 2s infinite; }
        @keyframes pulse-out { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }

        .status-pulse { width: 8px; height: 8px; border-radius: 50%; background: #10b981; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="flex h-screen bg-surface-50 dark:bg-surface-950 overflow-hidden">

    <div id="loader" class="fixed inset-0 z-[999] bg-white dark:bg-surface-950 flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="relative flex items-center justify-center">
            <div class="w-24 h-24 border-4 border-brand-500 border-t-transparent rounded-full animate-spin"></div>
            <img src="blixa.png" class="absolute w-12 h-12 rounded-xl" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4712/4712139.png'">
        </div>
        <p class="mt-6 blixa-gradient-text text-xl font-black uppercase tracking-widest">Neural Link Connecting</p>
    </div>

    <div id="blixa-terminal" class="fixed bottom-32 right-6 z-50 w-72 h-48 bg-black/90 rounded-2xl border border-white/10 p-4 shadow-2xl hidden md:block">
        <div class="flex items-center justify-between mb-3 border-b border-white/10 pb-2">
            <div class="flex items-center gap-2">
                <div class="status-pulse"></div>
                <span class="text-[10px] font-bold text-white uppercase tracking-tighter">Self-Healing Terminal</span>
            </div>
        </div>
        <div id="terminal-content" class="h-32 overflow-y-auto no-scrollbar">
            <div class="terminal-line">> Initializing system... OK</div>
            <div class="terminal-line info">> Status: Ready for commands</div>
        </div>
    </div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-80 glass-card border-r transform -translate-x-full lg:translate-x-0 lg:relative transition-transform duration-500 flex flex-col">
        <div class="p-6">
            <div class="flex items-center justify-between mb-10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-500 to-orange-400 flex items-center justify-center">
                        <img src="blixa.png" class="w-8 h-8" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4712/4712139.png'">
                    </div>
                    <span class="blixa-gradient-text text-2xl font-black">Blixa</span>
                </div>
                <button onclick="toggleSidebar()" class="lg:hidden p-2"><i data-lucide="x"></i></button>
            </div>
            <button onclick="location.reload()" class="w-full flex items-center justify-center gap-3 py-4 bg-brand-500 hover:bg-brand-600 text-white rounded-2xl font-bold shadow-xl transition-all active:scale-95 mb-8">
                <i data-lucide="sparkles" class="w-5 h-5"></i> New Intelligence
            </button>
        </div>
        <div class="flex-1 overflow-y-auto px-4 space-y-3 no-scrollbar" id="chat-list"></div>
        <div class="p-4 border-t border-zinc-200 dark:border-zinc-800">
            <div class="flex items-center gap-3 p-4 bg-zinc-100/50 dark:bg-zinc-900/50 rounded-2xl">
                <img src="https://ui-avatars.com/api/?name=User&background=random" class="w-11 h-11 rounded-full border-2 border-brand-500">
                <div>
                    <p class="text-xs font-black uppercase">Operator 01</p>
                    <p class="text-[9px] font-bold text-green-500 tracking-widest uppercase">Online</p>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-2 mt-4">
                <button onclick="toggleDarkMode()" class="p-3 flex flex-col items-center gap-1 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded-xl">
                    <i data-lucide="moon" class="w-4 h-4 text-brand-500"></i>
                    <span class="text-[9px] font-black uppercase">Theme</span>
                </button>
                <button onclick="alert('Settings Open')" class="p-3 flex flex-col items-center gap-1 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded-xl">
                    <i data-lucide="settings" class="w-4 h-4 text-zinc-400"></i>
                    <span class="text-[9px] font-black uppercase">Core</span>
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative overflow-hidden">
        <header class="flex items-center justify-between p-4 md:px-8 glass-card border-b z-40">
            <button onclick="toggleSidebar()" class="lg:hidden p-2"><i data-lucide="menu"></i></button>
            <div class="flex items-center gap-2">
                <span class="text-lg font-black tracking-tight">BLIXA <span class="text-brand-500">CORE</span></span>
            </div>
            <div class="w-10"></div>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-12 space-y-8 no-scrollbar pb-40">
            <div id="welcome-view" class="h-full flex flex-col items-center justify-center text-center">
                <div class="w-24 h-24 bg-brand-500 rounded-[30px] flex items-center justify-center shadow-2xl mb-8 rotate-6">
                    <img src="blixa.png" class="w-14 h-14" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4712/4712139.png'">
                </div>
                <h1 class="text-5xl md:text-7xl font-black mb-6 full-gradient tracking-tighter">Autonomous AI.</h1>
                <p class="text-zinc-500 max-w-md font-medium">System ready for professional commands. Self-healing logic active.</p>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 right-0 p-4 md:px-10 pb-10 bg-gradient-to-t from-white dark:from-surface-950 via-transparent">
            <div class="max-w-4xl mx-auto">
                <div class="glass-card rounded-[32px] p-2 flex flex-col shadow-2xl border dark:border-white/5">
                    <textarea id="user-input" rows="1" placeholder="Type command..." class="w-full bg-transparent px-5 py-3 outline-none resize-none text-zinc-800 dark:text-white max-h-48" oninput="this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'"></textarea>
                    <div class="flex items-center justify-between px-4 pb-2">
                        <div class="flex gap-2">
                            <button class="p-2 text-zinc-400 hover:text-brand-500"><i data-lucide="mic"></i></button>
                            <button class="p-2 text-zinc-400 hover:text-indigo-500"><i data-lucide="paperclip"></i></button>
                        </div>
                        <button onclick="sendMessage()" class="p-3 bg-brand-500 text-white rounded-2xl hover:scale-105 active:scale-95 transition-all">
                            <i data-lucide="navigation"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Initialization
        window.onload = () => {
            lucide.createIcons();
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }, 1500);
        };

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-container');
            const welcome = document.getElementById('welcome-view');

            if (input.value.trim() === "") return;

            if (welcome) welcome.remove();

            // User Message
            const userDiv = document.createElement('div');
            userDiv.className = "flex justify-end mb-4";
            userDiv.innerHTML = `<div class="bg-brand-500 text-white p-4 rounded-2xl max-w-[80%] font-medium">${input.value}</div>`;
            container.appendChild(userDiv);

            // System Logging
            const term = document.getElementById('terminal-content');
            const line = document.createElement('div');
            line.className = "terminal-line info";
            line.innerText = `> Processed: ${input.value.substring(0, 15)}...`;
            term.appendChild(line);
            term.scrollTop = term.scrollHeight;

            input.value = "";
            input.style.height = 'auto';
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
