<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blixa AI - Perfect Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        .blixa-logo-text { background: linear-gradient(to bottom, #ff0000, #ffea00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .full-gradient { background: linear-gradient(to right, #0ea5e9, #a855f7, #f43f5e, #fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #ffffff; z-index: 9999; }
        .dark #loading { background: #131314; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        html, body { height: 100%; overflow: hidden; }
    </style>
</head>
<body class="bg-white dark:bg-[#131314] text-zinc-900 dark:text-zinc-100 transition-colors duration-300">

    <div id="loading">
        <div class="text-center">
            <img src="blixa.png" class="w-20 h-20 mx-auto animate-bounce" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4712/4712139.png'">
            <p class="mt-4 font-bold text-pink-500 tracking-tighter">INITIALIZING PERFECT BLIXA...</p>
        </div>
    </div>

    <div id="voice-overlay" class="fixed inset-0 bg-[#131314]/95 z-[100] hidden flex-col items-center justify-center text-white">
        <div class="w-32 h-32 bg-pink-600 rounded-full flex items-center justify-center animate-pulse mb-8 shadow-[0_0_50px_rgba(219,39,119,0.5)]">
            <i data-lucide="mic" class="w-12 h-12"></i>
        </div>
        <h2 id="v-status" class="text-2xl font-bold mb-4 text-pink-500">Listening...</h2>
        <p id="v-transcript" class="text-zinc-400 italic text-xl px-10 text-center max-w-lg leading-relaxed">Waiting for speech...</p>
        <button onclick="stopVoice()" class="mt-12 p-4 bg-zinc-800 hover:bg-red-600 rounded-full transition-all">
            <i data-lucide="phone-off" class="w-6 h-6"></i>
        </button>
    </div>

    <div class="flex h-screen overflow-hidden">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-zinc-50 dark:bg-[#1e1e20] border-r border-zinc-200 dark:border-zinc-800 transform -translate-x-full md:translate-x-0 transition-transform duration-300 flex flex-col">
            <div class="p-6 flex items-center gap-3">
                <img src="blixa.png" class="w-10 h-10 object-contain" onerror="this.style.display='none'">
                <span class="blixa-logo-text text-3xl">Blixa</span>
            </div>
            <button onclick="newChat()" class="mx-4 p-3 bg-pink-500 text-white rounded-xl font-bold hover:bg-pink-600 transition flex items-center justify-center gap-2">
                <i data-lucide="plus" class="w-5 h-5"></i> New Conversation
            </button>
            <div id="chat-list" class="flex-1 overflow-y-auto mt-4 px-3 space-y-1 no-scrollbar"></div>
            <div class="p-4 border-t border-zinc-200 dark:border-zinc-800 space-y-2">
                <button onclick="toggleDarkMode()" class="w-full flex items-center gap-3 p-3 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded-xl transition">
                    <i data-lucide="moon"></i> Appearance
                </button>
                <button onclick="openModal()" class="w-full flex items-center gap-3 p-3 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded-xl transition">
                    <i data-lucide="settings"></i> API Settings
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative min-w-0">
            <header class="md:hidden flex items-center justify-between p-4 border-b dark:border-zinc-800 bg-white dark:bg-[#131314]">
                <button onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
                <span class="blixa-logo-text text-2xl font-black">Blixa</span>
                <button onclick="newChat()"><i data-lucide="plus" class="text-pink-500"></i></button>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-10 space-y-6 pb-32 no-scrollbar">
                <div id="welcome" class="h-full flex flex-col items-center justify-center text-center opacity-50">
                    <img src="blixa.png" class="w-20 h-20 mb-4" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4712/4712139.png'">
                    <h1 class="text-4xl font-black full-gradient">Ready to help</h1>
                </div>
            </div>

            <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-white dark:from-[#131314]">
                <div class="max-w-3xl mx-auto bg-zinc-100 dark:bg-zinc-800 rounded-3xl p-2 shadow-xl border border-transparent focus-within:border-pink-500 transition-all">
                    <textarea id="user-input" rows="1" placeholder="Type a message..." class="w-full bg-transparent p-3 outline-none resize-none dark:text-white max-h-32"></textarea>
                    <div class="flex justify-between items-center px-2 pb-1">
                        <button onclick="startVoice()" class="p-2 text-zinc-500 hover:text-pink-500 transition"><i data-lucide="mic"></i></button>
                        <button id="send-btn" onclick="handleSend()" class="p-2 bg-pink-500 text-white rounded-full disabled:opacity-30" disabled><i data-lucide="arrow-up"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-[100] hidden bg-black/70 flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white dark:bg-zinc-900 w-full max-w-md rounded-3xl p-8 shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2"><i data-lucide="shield-check" class="text-pink-500"></i> System Config</h2>
            <div class="space-y-4">
                <input type="text" id="api-url" placeholder="Endpoint URL" class="w-full p-4 bg-zinc-100 dark:bg-zinc-800 rounded-xl outline-none border-2 border-transparent focus:border-pink-500 transition">
                <input type="password" id="api-key" placeholder="API Secret Key" class="w-full p-4 bg-zinc-100 dark:bg-zinc-800 rounded-xl outline-none border-2 border-transparent focus:border-pink-500 transition">
                <input type="text" id="api-model" placeholder="Model ID" class="w-full p-4 bg-zinc-100 dark:bg-zinc-800 rounded-xl outline-none border-2 border-transparent focus:border-pink-500 transition">
                <button onclick="saveSettings()" class="w-full py-4 bg-pink-500 text-white font-bold rounded-xl hover:shadow-lg active:scale-95 transition-all">Apply Perfection</button>
                <button onclick="closeModal()" class="w-full text-zinc-500 text-sm">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // System Prompt - Designed to prevent repetition
        const SYSTEM_PROMPT = "You are Blixa, a female AI assistant. RULE 1: If user says 'Hello' or similar, greet them ONLY ONCE per session. RULE 2: Use feminine grammar in all languages. RULE 3: Keep responses direct and concise. RULE 4: Do not repeat your introduction if the conversation is already active.";

        let appState = {
            url: localStorage.getItem('blixa_url') || 'https://openrouter.ai/api/v1',
            key: localStorage.getItem('blixa_key') || '',
            model: localStorage.getItem('blixa_model') || 'google/gemini-2.0-flash-001',
            chats: JSON.parse(localStorage.getItem('blixa_chats')) || [],
            currentId: null,
            isDark: localStorage.getItem('blixa_theme') === 'dark',
            hasGreeted: false,
            controller: null // To stop duplicate requests
        };

        const ui = {
            loading: document.getElementById('loading'),
            chat: document.getElementById('chat-container'),
            list: document.getElementById('chat-list'),
            input: document.getElementById('user-input'),
            send: document.getElementById('send-btn'),
            voice: document.getElementById('voice-overlay'),
            transcript: document.getElementById('v-transcript')
        };

        // Initialize Icons and Theme
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            if (appState.isDark) document.documentElement.classList.add('dark');
            renderChatList();
            
            // Auto-hide loading screen after 1.5s (Safety Fix)
            setTimeout(() => {
                ui.loading.style.opacity = '0';
                setTimeout(() => ui.loading.style.display = 'none', 500);
            }, 1500);
        });

        async function handleSend() {
            const text = ui.input.value.trim();
            if (!text || !appState.key) return;

            // Stop any existing request (Prevents Error & Repetition)
            if (appState.controller) appState.controller.abort();
            appState.controller = new AbortController();

            if (!appState.currentId) {
                appState.currentId = Date.now();
                appState.chats.push({ id: appState.currentId, title: text.slice(0, 20), messages: [{role: "system", content: SYSTEM_PROMPT}] });
                document.getElementById('welcome').classList.add('hidden');
            }

            const chat = appState.chats.find(c => c.id === appState.currentId);
            chat.messages.push({ role: "user", content: text });
            appendMessage("user", text);
            ui.input.value = '';
            ui.send.disabled = true;

            const aiMsgId = appendMessage("assistant", "Thinking...");
            
            try {
                const response = await fetch(`${appState.url}/chat/completions`, {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${appState.key}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: appState.model, messages: chat.messages }),
                    signal: appState.controller.signal
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;
                
                document.getElementById(aiMsgId).innerHTML = marked.parse(reply);
                chat.messages.push({ role: "assistant", content: reply });
                localStorage.setItem('blixa_chats', JSON.stringify(appState.chats));
                addSpeaker(aiMsgId, reply);
                renderChatList();
            } catch (err) {
                if (err.name !== 'AbortError') {
                    document.getElementById(aiMsgId).innerText = "Connection Error. Check API Settings.";
                }
            } finally {
                ui.send.disabled = false;
            }
        }

        function appendMessage(role, text) {
            const id = 'msg-' + Math.random().toString(36).substr(2, 9);
            const isUser = role === 'user';
            const html = `
                <div class="flex ${isUser ? 'justify-end' : 'justify-start'} animate-fade-in">
                    <div class="max-w-[85%] p-4 rounded-2xl ${isUser ? 'bg-pink-500 text-white rounded-tr-none' : 'bg-zinc-100 dark:bg-zinc-800 rounded-tl-none'} shadow-sm">
                        <div id="${id}" class="prose dark:prose-invert prose-sm">${marked.parse(text)}</div>
                    </div>
                </div>`;
            ui.chat.insertAdjacentHTML('beforeend', html);
            ui.chat.scrollTop = ui.chat.scrollHeight;
            return id;
        }

        function addSpeaker(id, text) {
            const btn = document.createElement('button');
            btn.className = "mt-2 text-zinc-400 hover:text-pink-500 transition";
            btn.innerHTML = '<i data-lucide="volume-2" class="w-4 h-4"></i>';
            btn.onclick = () => {
                window.speechSynthesis.cancel();
                const utt = new SpeechSynthesisUtterance(text.replace(/[#*`]/g, ''));
                const voices = window.speechSynthesis.getVoices();
                utt.voice = voices.find(v => v.name.includes('Female')) || voices[0];
                window.speechSynthesis.speak(utt);
            };
            document.getElementById(id).appendChild(btn);
            lucide.createIcons();
        }

        // Voice Perfection
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.continuous = true;
        recognition.interimResults = true;

        recognition.onresult = (e) => {
            let final = '';
            for (let i = e.resultIndex; i < e.results.length; ++i) {
                if (e.results[i].isFinal) final += e.results[i][0].transcript;
            }
            if (final) {
                ui.transcript.innerText = `(${final})`;
                ui.input.value = final;
                stopVoice();
                handleSend();
            }
        };

        function startVoice() { ui.voice.classList.remove('hidden'); recognition.start(); }
        function stopVoice() { ui.voice.classList.add('hidden'); recognition.stop(); }

        // Settings Logic
        function openModal() { 
            document.getElementById('api-url').value = appState.url;
            document.getElementById('api-key').value = appState.key;
            document.getElementById('api-model').value = appState.model;
            document.getElementById('settings-modal').classList.remove('hidden'); 
        }
        function closeModal() { document.getElementById('settings-modal').classList.add('hidden'); }
        function saveSettings() {
            appState.url = document.getElementById('api-url').value;
            appState.key = document.getElementById('api-key').value;
            appState.model = document.getElementById('api-model').value;
            localStorage.setItem('blixa_url', appState.url);
            localStorage.setItem('blixa_key', appState.key);
            localStorage.setItem('blixa_model', appState.model);
            closeModal();
        }

        function renderChatList() {
            ui.list.innerHTML = appState.chats.slice().reverse().map(c => `
                <div onclick="loadChat(${c.id})" class="p-3 rounded-xl cursor-pointer hover:bg-zinc-200 dark:hover:bg-zinc-800 truncate text-sm ${appState.currentId === c.id ? 'bg-pink-500/10 text-pink-500 font-bold' : ''}">
                    ${c.title}
                </div>
            `).join('');
        }

        function loadChat(id) {
            appState.currentId = id;
            const chat = appState.chats.find(c => c.id === id);
            document.getElementById('welcome').classList.add('hidden');
            ui.chat.innerHTML = '';
            chat.messages.filter(m => m.role !== 'system').forEach(m => appendMessage(m.role, m.content));
            if(window.innerWidth < 768) toggleSidebar();
            renderChatList();
        }

        function newChat() {
            appState.currentId = null;
            ui.chat.innerHTML = '<div id="welcome" class="h-full flex flex-col items-center justify-center text-center opacity-50"><img src="blixa.png" class="w-20 h-20 mb-4" onerror="this.src=\'https://cdn-icons-png.flaticon.com/512/4712/4712139.png\'"><h1 class="text-4xl font-black full-gradient">Ready to help</h1></div>';
            renderChatList();
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
        function toggleDarkMode() {
            appState.isDark = !appState.isDark;
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('blixa_theme', appState.isDark ? 'dark' : 'light');
        }

        ui.input.oninput = () => { ui.send.disabled = !ui.input.value.trim(); };
    </script>
</body>
</html>
