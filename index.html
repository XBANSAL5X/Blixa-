<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blixa AI | Glass Architecture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --vh: 1vh; }
        body { 
            background: radial-gradient(at 0% 0%, rgba(96, 165, 250, 0.15) 0, transparent 50%), 
                        radial-gradient(at 100% 100%, rgba(192, 132, 252, 0.15) 0, transparent 50%),
                        #ffffff;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        
        .dark body { background-color: #09090b; color: #fafafa; }

        /* Glassmorphism Effect */
        .glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass {
            background: rgba(24, 24, 27, 0.6);
            border: 1px solid rgba(63, 63, 70, 0.4);
        }

        /* Message Boxes */
        .msg-user {
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 20px 20px 4px 20px;
        }
        .msg-blixa {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(228, 228, 231, 0.8);
            border-radius: 20px 20px 20px 4px;
            box-shadow: 0 4px 15px -3px rgba(0, 0, 0, 0.05);
        }
        .dark .msg-blixa {
            background: rgba(39, 39, 42, 0.6);
            border: 1px solid rgba(63, 63, 70, 0.5);
        }

        #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: white; z-index: 9999; }
        .dark #loading { background: #09090b; color: white; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .typing::after { content: "●"; animation: blink 1s infinite; color: #3b82f6; margin-left: 5px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        pre { background: #18181b !important; padding: 1rem; border-radius: 12px; margin: 8px 0; overflow-x: auto; }
        code { color: #60a5fa; }
    </style>
</head>
<body class="flex h-screen w-screen font-sans">

    <div id="loading">
        <div class="flex flex-col items-center gap-4">
            <div class="animate-pulse text-4xl font-bold text-blue-500">BLIXA</div>
            <div class="w-48 h-1 bg-gray-200 rounded-full overflow-hidden">
                <div class="h-full bg-blue-500 animate-[loading_2s_ease-in-out_infinite]"></div>
            </div>
        </div>
    </div>
    <style> @keyframes loading { 0% { width: 0; } 50% { width: 100%; } 100% { width: 0; } } </style>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-80 glass m-4 rounded-3xl transform -translate-x-[110%] md:translate-x-0 transition-transform duration-300 flex flex-col shadow-2xl">
        <div class="p-6 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-500/30">
                    <i data-lucide="sparkles" class="w-6 h-6"></i>
                </div>
                <span class="text-2xl font-black tracking-tight">Blixa</span>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden p-2"><i data-lucide="chevron-left"></i></button>
        </div>

        <button onclick="newChat()" class="mx-6 p-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl transition-all flex items-center justify-center gap-2 font-bold shadow-lg shadow-blue-500/20 active:scale-95">
            <i data-lucide="plus-circle" class="w-5 h-5"></i> New Conversation
        </button>

        <div id="chat-list" class="flex-1 overflow-y-auto px-4 mt-6 space-y-2 no-scrollbar"></div>

        <div class="p-6 border-t border-white/20 dark:border-zinc-800/50 space-y-3">
            <button onclick="toggleDarkMode()" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-white/40 dark:hover:bg-zinc-800/50 rounded-xl transition text-sm font-semibold">
                <i data-lucide="moon" id="dark-icon"></i> <span id="dark-text">Dark Mode</span>
            </button>
            <button onclick="openModal('settings-modal')" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-white/40 dark:hover:bg-zinc-800/50 rounded-xl transition text-sm font-semibold">
                <i data-lucide="sliders"></i> API Settings
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 h-full relative p-4">
        <header class="flex items-center justify-between px-4 py-2 md:hidden">
            <button onclick="toggleSidebar()" class="p-3 glass rounded-2xl shadow-sm"><i data-lucide="menu"></i></button>
            <span class="font-bold text-xl">Blixa</span>
            <div class="w-10"></div>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto px-2 md:px-12 space-y-8 pt-6 pb-40 no-scrollbar">
            <div id="welcome-view" class="h-full flex flex-col items-center justify-center text-center space-y-6">
                <div class="w-24 h-24 glass rounded-[40px] flex items-center justify-center shadow-xl">
                    <i data-lucide="bot" class="w-12 h-12 text-blue-500"></i>
                </div>
                <div>
                    <h1 class="text-4xl md:text-6xl font-black mb-2">I am Blixa.</h1>
                    <p class="text-gray-500 dark:text-zinc-400 font-medium">Your transparent window to intelligence.</p>
                </div>
            </div>
        </div>

        <div class="absolute bottom-8 left-0 right-0 px-4 md:px-12">
            <div class="max-w-4xl mx-auto">
                <div class="glass shadow-2xl rounded-[32px] p-3 flex flex-col focus-within:ring-2 ring-blue-500/50 transition-all">
                    <textarea id="user-input" rows="1" placeholder="Type your message..." 
                        class="w-full bg-transparent px-4 py-3 outline-none resize-none max-h-60 text-lg dark:placeholder-zinc-500"></textarea>
                    <div class="flex justify-between items-center px-2 py-1">
                        <div class="flex gap-2">
                             <button onclick="openModal('sys-modal')" class="p-2.5 hover:bg-black/5 dark:hover:bg-white/5 rounded-full text-zinc-500 transition"><i data-lucide="command" class="w-5 h-5"></i></button>
                        </div>
                        <button id="send-btn" onclick="handleSend()" class="p-3 bg-blue-600 hover:bg-blue-700 disabled:opacity-20 text-white rounded-2xl transition shadow-xl shadow-blue-500/30" disabled>
                            <i data-lucide="send" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="settings-modal" class="fixed inset-0 z-[70] hidden items-center justify-center bg-black/60 backdrop-blur-md p-4">
        <div class="glass w-full max-w-md rounded-[32px] p-8 shadow-2xl scale-in-center">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold">API Configuration</h2>
                <button onclick="closeModal('settings-modal')"><i data-lucide="x"></i></button>
            </div>
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 mb-2">OpenRouter API Key</label>
                    <input type="password" id="api-key-input" class="w-full p-4 glass rounded-2xl outline-none focus:ring-2 ring-blue-500" placeholder="sk-or-v1-...">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 mb-2">Model</label>
                    <input type="text" id="model-input" class="w-full p-4 glass rounded-2xl outline-none" placeholder="deepseek/deepseek-r1:free">
                </div>
                <button onclick="saveSettings()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl shadow-lg transition-all active:scale-95">Save Preferences</button>
            </div>
        </div>
    </div>

    <div id="sys-modal" class="fixed inset-0 z-[70] hidden items-center justify-center bg-black/60 backdrop-blur-md p-4">
        <div class="glass w-full max-w-md rounded-[32px] p-8">
            <h2 class="text-xl font-bold mb-4">System Identity</h2>
            <textarea id="sys-prompt-input" rows="5" class="w-full p-4 glass rounded-2xl outline-none mb-6" placeholder="Define how Blixa should behave..."></textarea>
            <button onclick="saveSystemPrompt()" class="w-full py-3 bg-zinc-900 dark:bg-white dark:text-black text-white font-bold rounded-2xl">Update Personality</button>
        </div>
    </div>

    <script>
        // --- State Management ---
        const state = {
            apiKey: localStorage.getItem('blixa_key') || '',
            model: localStorage.getItem('blixa_model') || 'deepseek/deepseek-r1:free',
            systemPrompt: localStorage.getItem('blixa_sys') || 'You are Blixa, an advanced AI with a sleek glass-inspired interface. Be concise and professional.',
            chats: JSON.parse(localStorage.getItem('blixa_chats')) || [],
            currentChatId: null,
            isDarkMode: localStorage.getItem('blixa_theme') === 'dark',
            isSidebarOpen: false
        };

        const els = {
            chatContainer: document.getElementById('chat-container'),
            chatList: document.getElementById('chat-list'),
            userInput: document.getElementById('user-input'),
            sendBtn: document.getElementById('send-btn'),
            welcomeView: document.getElementById('welcome-view')
        };

        // --- Core Engine ---
        function init() {
            if (state.isDarkMode) document.documentElement.classList.add('dark');
            document.getElementById('api-key-input').value = state.apiKey;
            document.getElementById('model-input').value = state.model;
            document.getElementById('sys-prompt-input').value = state.systemPrompt;
            
            renderChatList();
            updateThemeUI();
            lucide.createIcons();

            els.userInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = this.scrollHeight + 'px';
                els.sendBtn.disabled = !this.value.trim();
            });

            setTimeout(() => document.getElementById('loading').style.display = 'none', 800);
        }

        async function handleSend() {
            const text = els.userInput.value.trim();
            if (!text || !state.apiKey) {
                if (!state.apiKey) openModal('settings-modal');
                return;
            }

            if (!state.currentChatId) {
                state.currentChatId = Date.now();
                state.chats.push({ id: state.currentChatId, title: text.substring(0, 30), messages: [] });
                els.welcomeView.classList.add('hidden');
            }

            const currentChat = state.chats.find(c => c.id === state.currentChatId);
            currentChat.messages.push({ role: 'user', content: text });
            appendMessageUI('user', text);
            
            els.userInput.value = '';
            els.userInput.style.height = 'auto';
            els.sendBtn.disabled = true;

            const aiMsgId = appendMessageUI('assistant', '');
            const aiContainer = document.getElementById(aiMsgId);
            aiContainer.classList.add('typing');

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${state.apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": state.model,
                        "messages": [{ "role": "system", "content": state.systemPrompt }, ...currentChat.messages],
                        "stream": true
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const lines = decoder.decode(value).split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                fullResponse += data.choices[0]?.delta?.content || "";
                                aiContainer.innerHTML = marked.parse(fullResponse);
                                els.chatContainer.scrollTo(0, els.chatContainer.scrollHeight);
                            } catch (e) {}
                        }
                    }
                }

                aiContainer.classList.remove('typing');
                currentChat.messages.push({ role: 'assistant', content: fullResponse });
                saveAndRender();

            } catch (err) {
                aiContainer.innerHTML = `<span class="text-red-500 italic">Connection lost. Check API Key.</span>`;
            }
        }

        function appendMessageUI(role, content) {
            const id = 'msg-' + Date.now();
            const isUser = role === 'user';
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${isUser ? 'justify-end' : 'justify-start'} w-full transition-all duration-500 ease-out scale-in-center`;
            
            wrapper.innerHTML = `
                <div class="max-w-[85%] md:max-w-[70%] ${isUser ? 'msg-user text-blue-900 dark:text-blue-100' : 'msg-blixa'} p-4 md:p-6">
                    <div class="flex items-center gap-2 mb-2 opacity-50">
                        <i data-lucide="${isUser ? 'user' : 'bot'}" class="w-3 h-3"></i>
                        <span class="text-[10px] font-black uppercase tracking-tighter">${isUser ? 'Sender' : 'Blixa Core'}</span>
                    </div>
                    <div id="${id}" class="prose dark:prose-invert prose-sm md:prose-base leading-relaxed">
                        ${marked.parse(content)}
                    </div>
                </div>
            `;
            
            els.chatContainer.appendChild(wrapper);
            els.chatContainer.scrollTo({ top: els.chatContainer.scrollHeight, behavior: 'smooth' });
            lucide.createIcons();
            return id;
        }

        // --- UI Logic ---
        function renderChatList() {
            els.chatList.innerHTML = '';
            state.chats.slice().reverse().forEach(chat => {
                const isActive = chat.id === state.currentChatId;
                const div = document.createElement('div');
                div.className = `group p-4 rounded-2xl cursor-pointer transition-all flex items-center gap-3 ${isActive ? 'bg-blue-600/10 border-l-4 border-blue-600' : 'hover:bg-white/20'}`;
                div.onclick = () => loadChat(chat.id);
                div.innerHTML = `
                    <i data-lucide="message-square" class="w-4 h-4 opacity-40"></i>
                    <span class="truncate flex-1 text-sm font-bold opacity-80">${chat.title}</span>
                    <button onclick="deleteChat(event, ${chat.id})" class="opacity-0 group-hover:opacity-100 hover:text-red-500 transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                `;
                els.chatList.appendChild(div);
            });
            lucide.createIcons();
        }

        function loadChat(id) {
            state.currentChatId = id;
            const chat = state.chats.find(c => c.id === id);
            els.welcomeView.classList.add('hidden');
            els.chatContainer.innerHTML = '';
            chat.messages.forEach(msg => appendMessageUI(msg.role, msg.content));
            renderChatList();
            if (window.innerWidth < 768) toggleSidebar();
        }

        function toggleSidebar() {
            state.isSidebarOpen = !state.isSidebarOpen;
            document.getElementById('sidebar').style.transform = state.isSidebarOpen ? 'translateX(0)' : '';
        }

        function toggleDarkMode() {
            state.isDarkMode = !state.isDarkMode;
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('blixa_theme', state.isDarkMode ? 'dark' : 'light');
            updateThemeUI();
        }

        function updateThemeUI() {
            const icon = document.getElementById('dark-icon');
            icon.setAttribute('data-lucide', state.isDarkMode ? 'sun' : 'moon');
            lucide.createIcons();
        }

        function openModal(id) { document.getElementById(id).classList.replace('hidden', 'flex'); }
        function closeModal(id) { document.getElementById(id).classList.replace('flex', 'hidden'); }

        function saveSettings() {
            state.apiKey = document.getElementById('api-key-input').value;
            state.model = document.getElementById('model-input').value || 'deepseek/deepseek-r1:free';
            localStorage.setItem('blixa_key', state.apiKey);
            localStorage.setItem('blixa_model', state.model);
            closeModal('settings-modal');
        }

        function deleteChat(e, id) {
            e.stopPropagation();
            state.chats = state.chats.filter(c => c.id !== id);
            if (state.currentChatId === id) newChat();
            saveAndRender();
        }

        function newChat() {
            state.currentChatId = null;
            els.chatContainer.innerHTML = '';
            els.chatContainer.appendChild(els.welcomeView);
            els.welcomeView.classList.remove('hidden');
            renderChatList();
        }

        function saveAndRender() {
            localStorage.setItem('blixa_chats', JSON.stringify(state.chats));
            renderChatList();
        }

        window.onload = init;
    </script>
</body>
</html>

        <div class="absolute bottom-0 inset-x-0 p-4 md:p-8 bg-gradient-to-t from-black via-black/80 to-transparent">
            <div class="max-w-4xl mx-auto glass rounded-2xl border border-cyan-500/30 p-2 group shadow-[0_0_30px_rgba(0,0,0,0.5)]">
                <div class="flex items-end gap-2">

    <div id="settings-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
        <div class="glass border-cyan-500/30 w-full max-w-md rounded-2xl p-8 shadow-2xl">
            <h2 class="text-xl font-bold text-cyan-400 mb-6 font-mono tracking-widest uppercase">System Config</h2>
            <div class="space-y-4">
                <input type="password" id="api-key-input" class="w-full bg-black/50 border border-zinc-800 p-3 rounded-lg text-white outline-none focus:border-cyan-500 transition" placeholder="API Key">
                <input type="text" id="model-input" class="w-full bg-black/50 border border-zinc-800 p-3 rounded-lg text-white outline-none focus:border-cyan-500 transition" placeholder="Model Path">

                <button onclick="closeModal('settings-modal')" class="w-full py-2 text-zinc-500 text-sm">Cancel</button>
            </div>

    <script>
        let state = {
            apiKey: localStorage.getItem('blixa_key') || '',
            model: localStorage.getItem('blixa_model') || 'deepseek/deepseek-r1:free',
            chats: JSON.parse(localStorage.getItem('blixa_chats')) || [],
            currentChatId: null,
            isSidebarOpen: false
        };

        const elements = {
            loading: document.getElementById('loading'),
            chatContainer: document.getElementById('chat-container'),
            chatList: document.getElementById('chat-list'),
            userInput: document.getElementById('user-input'),
            sendBtn: document.getElementById('send-btn'),
            welcomeView: document.getElementById('welcome-view'),
            apiKeyInput: document.getElementById('api-key-input'),
            modelInput: document.getElementById('model-input'),
            modelBadge: document.getElementById('model-badge')
        };

        window.addEventListener('DOMContentLoaded', () => {
            elements.apiKeyInput.value = state.apiKey;
            elements.modelInput.value = state.model;
            elements.modelBadge.innerText = `Model: ${state.model.split('/').pop()}`;
            renderChatList();
            lucide.createIcons();
            
            elements.userInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
                elements.sendBtn.disabled = !this.value.trim();
            });

            setTimeout(() => { elements.loading.style.display = 'none'; }, 800);
        });

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            state.isSidebarOpen = !state.isSidebarOpen;
            sidebar.classList.toggle('-translate-x-full', !state.isSidebarOpen);
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function saveSettings() {
            state.apiKey = elements.apiKeyInput.value.trim();
            state.model = elements.modelInput.value.trim() || 'deepseek/deepseek-r1:free';
            localStorage.setItem('blixa_key', state.apiKey);
            localStorage.setItem('blixa_model', state.model);
            elements.modelBadge.innerText = `Model: ${state.model.split('/').pop()}`;
            closeModal('settings-modal');
        }

        async function handleSend() {
            const text = elements.userInput.value.trim();
            if (!text || !state.apiKey) {
                if (!state.apiKey) openModal('settings-modal');
                return;
            }

            if (!state.currentChatId) {
                state.currentChatId = Date.now();
                state.chats.push({ id: state.currentChatId, title: text.substring(0, 25), messages: [] });
                elements.welcomeView.classList.add('hidden');
            }

            const currentChat = state.chats.find(c => c.id === state.currentChatId);
            currentChat.messages.push({ role: 'user', content: text });
            appendMessageUI('user', text);
            
            elements.userInput.value = '';
            elements.userInput.style.height = 'auto';
            elements.sendBtn.disabled = true;

            const aiMsgId = appendMessageUI('assistant', '');
            const aiContainer = document.getElementById(aiMsgId);
            aiContainer.classList.add('typing');

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${state.apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ "model": state.model, "messages": currentChat.messages, "stream": true })
                });

                const reader = response.body.getReader();
                let fullResponse = "";
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = new TextDecoder().decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                fullResponse += data.choices[0]?.delta?.content || "";
                                aiContainer.innerHTML = marked.parse(fullResponse);
                                elements.chatContainer.scrollTo(0, elements.chatContainer.scrollHeight);
                            } catch (e) {}
                        }
                    }
                }
                aiContainer.classList.remove('typing');
                currentChat.messages.push({ role: 'assistant', content: fullResponse });
                saveChats();
                renderChatList();
            } catch (err) {
                aiContainer.innerHTML = `<span class="text-red-400">INTERFACE_ERROR: Communication failed.</span>`;
            }
        }

        function appendMessageUI(role, content) {
            const id = 'msg-' + Date.now();
            const isUser = role === 'user';
            const wrapper = document.createElement('div');
            wrapper.className = `flex flex-col ${isUser ? 'items-end' : 'items-start'}`;
            
            wrapper.innerHTML = `
                <div class="msg-box ${isUser ? 'msg-user' : 'msg-blixa'}">
                    <div class="flex items-center gap-2 mb-2 text-[10px] font-mono ${isUser ? 'text-cyan-400' : 'text-purple-400'}">
                        <span>${isUser ? 'AUTH_USER' : 'BLIXA_CORE'}</span>
                        <span class="opacity-30">|</span>
                        <span>${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                    </div>
                    <div id="${id}" class="prose prose-invert prose-cyan max-w-none">
                        ${marked.parse(content)}
                    </div>
                </div>
            `;
            elements.chatContainer.appendChild(wrapper);
            elements.chatContainer.scrollTo(0, elements.chatContainer.scrollHeight);
            return id;
        }

        function newChat() {
            state.currentChatId = null;
            elements.chatContainer.innerHTML = '';
            elements.chatContainer.appendChild(elements.welcomeView);
            elements.welcomeView.classList.remove('hidden');
            renderChatList();
            if(window.innerWidth < 768) toggleSidebar();
        }

        function renderChatList() {
            elements.chatList.innerHTML = '';
            state.chats.slice().reverse().forEach(chat => {
                const active = chat.id === state.currentChatId;
                const div = document.createElement('div');
                div.className = `p-3 rounded-lg cursor-pointer border ${active ? 'bg-cyan-500/10 border-cyan-500/50' : 'border-transparent hover:bg-white/5'} transition text-sm flex items-center gap-3`;
                div.onclick = () => loadChat(chat.id);
                div.innerHTML = `<i data-lucide="hash" class="w-3 h-3 text-cyan-500"></i> <span class="truncate text-zinc-400">${chat.title}</span>`;
                elements.chatList.appendChild(div);
            });
            lucide.createIcons();
        }

        function loadChat(id) {
            state.currentChatId = id;
            const chat = state.chats.find(c => c.id === id);
            elements.welcomeView.classList.add('hidden');
            elements.chatContainer.innerHTML = '';
            chat.messages.forEach(msg => appendMessageUI(msg.role, msg.content));
            renderChatList();
            if(window.innerWidth < 768) toggleSidebar();
        }

        function saveChats() { localStorage.setItem('blixa_chats', JSON.stringify(state.chats)); }
    </script>
</body>
</html>
