<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blixa AI | Neural Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #050506;
        }

        body {
            font-family: 'Space+Grotesk', sans-serif;
            background-color: var(--bg-dark);
            color: #e0e0e0;
            overflow-x: hidden;
        }

        /* Cyberpunk Grid Background */
        .bg-grid {
            background-image: linear-gradient(to right, rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Glassmorphism Containers */
        .glass {
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Sci-Fi Message Boxes */
        .msg-box {
            position: relative;
            padding: 1rem;
            border-radius: 4px 15px 15px 15px;
            max-width: 85%;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .msg-user {
            background: rgba(0, 242, 255, 0.05);
            border-left: 3px solid var(--neon-blue);
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
            align-self: flex-end;
            border-radius: 15px 4px 15px 15px;
        }

        .msg-blixa {
            background: rgba(188, 19, 254, 0.05);
            border-left: 3px solid var(--neon-purple);
            border-bottom: 1px solid rgba(188, 19, 254, 0.2);
            align-self: flex-start;
        }

        /* Scanline effect */
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 242, 255, 0.1);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 100;
            pointer-events: none;
            animation: moveScanline 8s linear infinite;
        }

        @keyframes moveScanline {
            0% { top: 0; }
            100% { top: 100%; }
        }

        /* Typing cursor */
        .typing::after {
            content: '_';
            animation: blink 1s step-end infinite;
            color: var(--neon-purple);
            font-weight: bold;
        }

        @keyframes blink { 50% { opacity: 0; } }

        code { font-family: 'JetBrains Mono', monospace; background: rgba(0,0,0,0.3); padding: 2px 4px; border-radius: 4px; }
        pre { background: #000 !important; border: 1px solid #333; padding: 12px; border-radius: 8px; margin: 10px 0; }

        #loading {
            position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            background: var(--bg-dark); z-index: 9999;
        }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row bg-grid">

    <div id="loading" class="flex-col gap-4">
        <div class="w-16 h-16 border-4 border-cyan-500/20 border-t-cyan-500 rounded-full animate-spin"></div>
        <div class="text-cyan-500 font-mono tracking-widest uppercase text-sm">Synchronizing Blixa...</div>
    </div>

    <div class="scanline"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 glass border-r border-cyan-500/20 transform -translate-x-full md:translate-x-0 md:relative flex flex-col h-full transition-transform duration-300">
        <div class="p-6 border-b border-cyan-500/20">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-purple-600 flex items-center justify-center shadow-[0_0_15px_rgba(6,182,212,0.5)]">
                    <i data-lucide="cpu" class="text-white w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="font-bold text-xl tracking-tighter text-white">BLIXA.v3</h1>
                    <span class="text-[10px] text-cyan-400 font-mono">NEURAL INTERFACE</span>
                </div>
            </div>
        </div>

        <div id="chat-list" class="flex-1 overflow-y-auto p-4 space-y-2 no-scrollbar"></div>

        <div class="p-4 border-t border-cyan-500/20 space-y-2">
            <button onclick="newChat()" class="w-full flex items-center gap-3 px-4 py-3 bg-cyan-500/10 hover:bg-cyan-500/20 border border-cyan-500/30 rounded-lg text-sm font-medium transition">
                <i data-lucide="plus" class="w-4 h-4 text-cyan-400"></i> Initialize New Task
            </button>
            <button onclick="openModal('settings-modal')" class="w-full flex items-center gap-3 px-4 py-2 text-zinc-400 hover:text-white transition text-sm">
                <i data-lucide="settings" class="w-4 h-4"></i> Configuration
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative h-full">
        <header class="h-16 glass border-b border-cyan-500/20 flex items-center justify-between px-6 z-40">
            <button onclick="toggleSidebar()" class="md:hidden text-cyan-500"><i data-lucide="menu"></i></button>
            <div class="flex items-center gap-4">
                <div class="hidden md:flex gap-4 text-[10px] font-mono text-cyan-500/60 uppercase">
                    <span>Status: Online</span>
                    <span id="model-badge">Model: Loading...</span>
                </div>
            </div>
            <div class="w-8 h-8 rounded-full border border-purple-500/50 flex items-center justify-center text-purple-500">
                <i data-lucide="user" class="w-4 h-4"></i>
            </div>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 flex flex-col no-scrollbar pb-32">
            <div id="welcome-view" class="m-auto text-center space-y-6 max-w-lg">
                <div class="inline-block p-4 rounded-2xl bg-cyan-500/5 border border-cyan-500/20 animate-pulse">
                    <i data-lucide="terminal" class="w-12 h-12 text-cyan-500"></i>
                </div>
                <h2 class="text-3xl font-bold tracking-tighter text-white">READY FOR INPUT</h2>
                <p class="text-zinc-500 font-mono text-sm leading-relaxed">System Blixa is online. Neural pathways connected. Awaiting command parameters...</p>
            </div>
        </div>

        <div class="absolute bottom-0 inset-x-0 p-4 md:p-8 bg-gradient-to-t from-black via-black/80 to-transparent">
            <div class="max-w-4xl mx-auto glass rounded-2xl border border-cyan-500/30 p-2 group shadow-[0_0_30px_rgba(0,0,0,0.5)]">
                <div class="flex items-end gap-2">
                    <textarea id="user-input" rows="1" placeholder="Type command..." 
                        class="flex-1 bg-transparent p-4 outline-none resize-none text-white placeholder-zinc-600 font-mono"></textarea>
                    <button id="send-btn" onclick="handleSend()" class="m-2 p-4 bg-cyan-600 hover:bg-cyan-500 text-white rounded-xl shadow-[0_0_15px_rgba(6,182,212,0.4)] transition disabled:opacity-20" disabled>
                        <i data-lucide="zap" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="settings-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
        <div class="glass border-cyan-500/30 w-full max-w-md rounded-2xl p-8 shadow-2xl">
            <h2 class="text-xl font-bold text-cyan-400 mb-6 font-mono tracking-widest uppercase">System Config</h2>
            <div class="space-y-4">
                <input type="password" id="api-key-input" class="w-full bg-black/50 border border-zinc-800 p-3 rounded-lg text-white outline-none focus:border-cyan-500 transition" placeholder="API Key">
                <input type="text" id="model-input" class="w-full bg-black/50 border border-zinc-800 p-3 rounded-lg text-white outline-none focus:border-cyan-500 transition" placeholder="Model Path">
                <button onclick="saveSettings()" class="w-full py-3 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-lg transition uppercase tracking-widest text-xs">Authorize Changes</button>
                <button onclick="closeModal('settings-modal')" class="w-full py-2 text-zinc-500 text-sm">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let state = {
            apiKey: localStorage.getItem('blixa_key') || '',
            model: localStorage.getItem('blixa_model') || 'deepseek/deepseek-r1:free',
            chats: JSON.parse(localStorage.getItem('blixa_chats')) || [],
            currentChatId: null,
            isSidebarOpen: false
        };

        const elements = {
            loading: document.getElementById('loading'),
            chatContainer: document.getElementById('chat-container'),
            chatList: document.getElementById('chat-list'),
            userInput: document.getElementById('user-input'),
            sendBtn: document.getElementById('send-btn'),
            welcomeView: document.getElementById('welcome-view'),
            apiKeyInput: document.getElementById('api-key-input'),
            modelInput: document.getElementById('model-input'),
            modelBadge: document.getElementById('model-badge')
        };

        window.addEventListener('DOMContentLoaded', () => {
            elements.apiKeyInput.value = state.apiKey;
            elements.modelInput.value = state.model;
            elements.modelBadge.innerText = `Model: ${state.model.split('/').pop()}`;
            renderChatList();
            lucide.createIcons();
            
            elements.userInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
                elements.sendBtn.disabled = !this.value.trim();
            });

            setTimeout(() => { elements.loading.style.display = 'none'; }, 800);
        });

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            state.isSidebarOpen = !state.isSidebarOpen;
            sidebar.classList.toggle('-translate-x-full', !state.isSidebarOpen);
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function saveSettings() {
            state.apiKey = elements.apiKeyInput.value.trim();
            state.model = elements.modelInput.value.trim() || 'deepseek/deepseek-r1:free';
            localStorage.setItem('blixa_key', state.apiKey);
            localStorage.setItem('blixa_model', state.model);
            elements.modelBadge.innerText = `Model: ${state.model.split('/').pop()}`;
            closeModal('settings-modal');
        }

        async function handleSend() {
            const text = elements.userInput.value.trim();
            if (!text || !state.apiKey) {
                if (!state.apiKey) openModal('settings-modal');
                return;
            }

            if (!state.currentChatId) {
                state.currentChatId = Date.now();
                state.chats.push({ id: state.currentChatId, title: text.substring(0, 25), messages: [] });
                elements.welcomeView.classList.add('hidden');
            }

            const currentChat = state.chats.find(c => c.id === state.currentChatId);
            currentChat.messages.push({ role: 'user', content: text });
            appendMessageUI('user', text);
            
            elements.userInput.value = '';
            elements.userInput.style.height = 'auto';
            elements.sendBtn.disabled = true;

            const aiMsgId = appendMessageUI('assistant', '');
            const aiContainer = document.getElementById(aiMsgId);
            aiContainer.classList.add('typing');

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${state.apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ "model": state.model, "messages": currentChat.messages, "stream": true })
                });

                const reader = response.body.getReader();
                let fullResponse = "";
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = new TextDecoder().decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                fullResponse += data.choices[0]?.delta?.content || "";
                                aiContainer.innerHTML = marked.parse(fullResponse);
                                elements.chatContainer.scrollTo(0, elements.chatContainer.scrollHeight);
                            } catch (e) {}
                        }
                    }
                }
                aiContainer.classList.remove('typing');
                currentChat.messages.push({ role: 'assistant', content: fullResponse });
                saveChats();
                renderChatList();
            } catch (err) {
                aiContainer.innerHTML = `<span class="text-red-400">INTERFACE_ERROR: Communication failed.</span>`;
            }
        }

        function appendMessageUI(role, content) {
            const id = 'msg-' + Date.now();
            const isUser = role === 'user';
            const wrapper = document.createElement('div');
            wrapper.className = `flex flex-col ${isUser ? 'items-end' : 'items-start'}`;
            
            wrapper.innerHTML = `
                <div class="msg-box ${isUser ? 'msg-user' : 'msg-blixa'}">
                    <div class="flex items-center gap-2 mb-2 text-[10px] font-mono ${isUser ? 'text-cyan-400' : 'text-purple-400'}">
                        <span>${isUser ? 'AUTH_USER' : 'BLIXA_CORE'}</span>
                        <span class="opacity-30">|</span>
                        <span>${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                    </div>
                    <div id="${id}" class="prose prose-invert prose-cyan max-w-none">
                        ${marked.parse(content)}
                    </div>
                </div>
            `;
            elements.chatContainer.appendChild(wrapper);
            elements.chatContainer.scrollTo(0, elements.chatContainer.scrollHeight);
            return id;
        }

        function newChat() {
            state.currentChatId = null;
            elements.chatContainer.innerHTML = '';
            elements.chatContainer.appendChild(elements.welcomeView);
            elements.welcomeView.classList.remove('hidden');
            renderChatList();
            if(window.innerWidth < 768) toggleSidebar();
        }

        function renderChatList() {
            elements.chatList.innerHTML = '';
            state.chats.slice().reverse().forEach(chat => {
                const active = chat.id === state.currentChatId;
                const div = document.createElement('div');
                div.className = `p-3 rounded-lg cursor-pointer border ${active ? 'bg-cyan-500/10 border-cyan-500/50' : 'border-transparent hover:bg-white/5'} transition text-sm flex items-center gap-3`;
                div.onclick = () => loadChat(chat.id);
                div.innerHTML = `<i data-lucide="hash" class="w-3 h-3 text-cyan-500"></i> <span class="truncate text-zinc-400">${chat.title}</span>`;
                elements.chatList.appendChild(div);
            });
            lucide.createIcons();
        }

        function loadChat(id) {
            state.currentChatId = id;
            const chat = state.chats.find(c => c.id === id);
            elements.welcomeView.classList.add('hidden');
            elements.chatContainer.innerHTML = '';
            chat.messages.forEach(msg => appendMessageUI(msg.role, msg.content));
            renderChatList();
            if(window.innerWidth < 768) toggleSidebar();
        }

        function saveChats() { localStorage.setItem('blixa_chats', JSON.stringify(state.chats)); }
    </script>
</body>
</html>
